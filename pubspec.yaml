name: shadya_ai
description: "Shadya AI - Assistant vocal pour personnes analphabètes et malvoyantes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shared_preferences: ^2.5.5
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  firebase_core: ^4.4.0
  firebase_ai: ^3.8.0
  firebase_app_check: ^0.4.5+2
  connectivity_plus: ^6.0.5
  flutter_contacts: ^1.1.9+2
  vosk_flutter:
    git:
      url: https://github.com/alphacep/vosk-flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
