name: Verify Keystore Secret

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and check keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set +e
          echo "Longueur totale :"
          echo -n "$KEYSTORE_BASE64" | wc -c
          echo "--- 60 premiers caractères ---"
          echo -n "$KEYSTORE_BASE64" | head -c 60
          echo ""
          echo "--- 60 derniers caractères ---"
          echo -n "$KEYSTORE_BASE64" | tail -c 60
          echo ""
          echo "--- Caractères invalides trouvés (hors A-Z a-z 0-9 + / =) ---"
          echo -n "$KEYSTORE_BASE64" | tr -d 'A-Za-z0-9+/=' | od -c | head -20
