name: Verify Keystore Secret

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and check keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set +e
          echo "$KEYSTORE_BASE64" | base64 -d > test.keystore
          echo "===== SHA256 DU FICHIER DECODÉ ====="
          sha256sum test.keystore
          echo ""
          echo "===== Comparez avec le SHA256 original ====="
          echo "Original attendu : c4cf778df8285cef3a786915976e06f4d990679e8cf8c4f46553e6941430578"
