name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Android keystore
        run: |
          keytool -genkey -v \
            -keystore shadyaai-release.keystore \
            -alias shadyaai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ShadyaAI2026Secure \
            -keypass ShadyaAI2026Secure \
            -dname "CN=Shadya AI, OU=DCC, O=Shadya AI, L=N'Djamena, S=Chari-Baguirmi, C=TD"

      - name: Print checksum and wrapped base64
        run: |
          echo "===== SHA256 CHECKSUM (pour vérification finale) ====="
          sha256sum shadyaai-release.keystore
          echo ""
          echo "===== COPIEZ TOUT LE BLOC CI-DESSOUS (toutes les lignes) ====="
          base64 shadyaai-release.keystore
          echo "===== FIN DU BLOC ====="
