name: Verify Keystore Secret

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and check keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > test.keystore 2> decode_error.txt
          if [ -s decode_error.txt ]; then
            echo "❌ ERREUR DE DECODAGE:"
            cat decode_error.txt
            exit 1
          fi
          echo "✅ Décodage réussi, taille du fichier :"
          ls -la test.keystore
          echo "Vérification du contenu keystore :"
          keytool -list -v -keystore test.keystore -storepass ShadyaAI2026Secure -alias shadyaai
