name: Verify Keystore Secret

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and check keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          set +e
          echo "$KEYSTORE_BASE64" | base64 -d > test.keystore
          echo "Alias attendu : $KEY_ALIAS"
          keytool -list -v -keystore test.keystore -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS"
          if [ $? -eq 0 ]; then
            echo "✅ SUCCES : mot de passe et alias corrects !"
          else
            echo "❌ ECHEC : mot de passe ou alias incorrect"
          fi
