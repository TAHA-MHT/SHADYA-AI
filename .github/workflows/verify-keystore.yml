name: Verify Keystore Secret

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Test key password with jarsigner
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          set +e
          echo "$KEYSTORE_BASE64" | base64 -d > test.keystore
          echo "Test un fichier factice pour verifier le keyPassword..."
          mkdir -p dummy && cd dummy
          echo "test" > file.txt
          jar cf dummy.jar file.txt
          jarsigner -keystore ../test.keystore -storepass "$STORE_PASSWORD" -keypass "$KEY_PASSWORD" dummy.jar "$KEY_ALIAS"
          if [ $? -eq 0 ]; then
            echo "✅ SUCCES : keyPassword correct, signature reussie !"
          else
            echo "❌ ECHEC : keyPassword incorrect"
          fi
