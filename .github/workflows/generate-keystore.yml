name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Android keystore
        run: |
          keytool -genkey -v \
            -keystore shadyaai-release.keystore \
            -alias shadyaai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ShadyaAI2026Secure \
            -keypass ShadyaAI2026Secure \
            -dname "CN=Shadya AI, OU=DCC, O=Shadya AI, L=N'Djamena, S=Chari-Baguirmi, C=TD"

      - name: Encode keystore to base64
        run: base64 -w 0 shadyaai-release.keystore > keystore-base64.txt

      - uses: actions/upload-artifact@v5
        with:
          name: shadyaai-keystore
          path: |
            shadyaai-release.keystore
            keystore-base64.txt
          retention-days: 1
