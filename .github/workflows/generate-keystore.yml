name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Android keystore
        run: |
          keytool -genkey -v \
            -keystore shadyaai-release.keystore \
            -alias shadyaai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ShadyaAI2026Secure \
            -keypass ShadyaAI2026Secure \
            -dname "CN=Shadya AI, OU=DCC, O=Shadya AI, L=N'Djamena, S=Chari-Baguirmi, C=TD"

      - name: Print base64 (copy this exactly)
        run: |
          echo "===== COPY BETWEEN THE MARKERS BELOW ====="
          base64 -w 0 shadyaai-release.keystore
          echo ""
          echo "===== END OF BASE64 ====="
