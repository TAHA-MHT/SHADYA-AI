name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IOS_BUNDLE_ID: com.shadyaai.app

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Prepare keystore + key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p "$RUNNER_WORKSPACE/environment"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_WORKSPACE/environment/android.keystore"
          cat <<EOF > "$RUNNER_WORKSPACE/environment/key.properties"
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$RUNNER_WORKSPACE/environment/android.keystore
          EOF

      - name: Print SHA-256 fingerprint
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          keytool -list -v \
            -keystore "$RUNNER_WORKSPACE/environment/android.keystore" \
            -alias "$KEY_ALIAS" \
            -storepass "$STORE_PASSWORD" | grep -A1 "SHA256"

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --verbose > build_log.txt 2>&1 || true
          tail -200 build_log.txt

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: full-build-log
          path: build_log.txt
          retention-days: 1

      - name: Debug - list build outputs
        run: find android/app/build -name "*.apk" 2>/dev/null || echo "Nothing found"

      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: android/app/build/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 1
